name: FraudShield Enterprise CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Quality Gate: Linting & Unit Tests
  test:
    name: 🧪 Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate synthetic data
        run: python src/generate_data.py

      - name: Run Data & Model Tests
        run: python -m pytest tests/test_data_and_model.py -v --tb=short

  # 2. Build & Containerize
  build:
    name: 🏗️ Containerize
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Production Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false # Set to true and add login steps if pushing to DockerHub/GHCR
          tags: |
            fraudshield-api:latest
            fraudshield-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3. Integration & Security
  security:
    name: 🛡️ Security Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Scan Docker Image for Vulnerabilities
        uses: snyk/actions/docker@master
        continue-on-error: true # For demo purposes
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: fraudshield-api:latest
          args: --file=Dockerfile
